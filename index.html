<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KC Dada Women's Clinic Staff</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KC Clinic">
<meta name="theme-color" content="#008069">
<style>
/* WhatsApp-like palette */
:root{
  --green:#008069;--green-d:#075e54;--tick:#53bdeb;--badge:#25d366;
  --chatbg:#efeae2;--in:#ffffff;--out:#d9fdd3;--tx:#111b21;--mut:#667781;
  --line:#e9edef;--bad:#dc2626;--warn:#d97706
}
*{box-sizing:border-box;margin:0}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--chatbg);color:var(--tx);height:100dvh;display:flex;flex-direction:column}
header{background:var(--green);color:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;padding-top:calc(12px + env(safe-area-inset-top))}
header .ttl{font-size:17px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
header .av{width:34px;height:34px;border-radius:50%;background:#0a8f76;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
header button.icn{background:none;border:0;color:#fff;font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
nav{display:flex;background:var(--green)}
nav button{flex:1;padding:12px 4px;border:0;background:none;font-size:13px;font-weight:600;letter-spacing:.3px;color:#cfe9e2;border-bottom:3px solid transparent;cursor:pointer;text-transform:uppercase}
nav button.on{color:#fff;border-color:#fff}
main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.pane{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.hide{display:none!important}

/* chat list */
.crow{display:flex;gap:12px;align-items:center;padding:11px 14px;background:#fff;border-bottom:1px solid var(--line);cursor:pointer}
.crow:active{background:#f5f6f6}
.crow .av{width:48px;height:48px;border-radius:50%;background:#dfe5e7;color:#5a6b73;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px;flex-shrink:0}
.crow .mid{flex:1;min-width:0}
.crow .nm{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crow .pv{font-size:13.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.crow .rt{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.crow .tm{font-size:12px;color:var(--mut)}
.badge{background:var(--badge);color:#fff;border-radius:999px;min-width:20px;height:20px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
.stat{font-size:10.5px;padding:1px 7px;border-radius:999px;background:#e7f8f3;color:var(--green)}
.stat.needs_human{background:#fef3c7;color:var(--warn)}
.stat.human{background:#d9fdd3;color:#067a53}
.stat.closed{background:#eceff1;color:var(--mut)}
.empty{color:var(--mut);padding:30px;text-align:center}

/* thread */
#thread{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--chatbg)}
#msgs{flex:1;overflow-y:auto;padding:12px 8px;display:flex;flex-direction:column;gap:3px}
.m{position:relative;max-width:82%;padding:6px 9px 8px;border-radius:8px;font-size:14.2px;line-height:1.35;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px .5px rgba(11,20,26,.13)}
.m.in{background:var(--in);align-self:flex-start;border-top-left-radius:0}
.m.out{background:var(--out);align-self:flex-end;border-top-right-radius:0}
.m img{max-width:100%;border-radius:6px;display:block;margin-bottom:3px}
.m .meta{float:right;margin:6px 0 -2px 8px;font-size:11px;color:var(--mut);white-space:nowrap}
.m .tick.read{color:var(--tick)}
.daysep{align-self:center;background:#fff;color:var(--mut);font-size:12px;padding:4px 10px;border-radius:8px;margin:6px 0;box-shadow:0 1px .5px rgba(11,20,26,.13)}

/* reply bar */
#replybar{display:flex;gap:6px;align-items:flex-end;padding:8px;background:#f0f2f5;border-top:1px solid var(--line);padding-bottom:calc(8px + env(safe-area-inset-bottom))}
#replybar .inwrap{flex:1;background:#fff;border-radius:22px;display:flex;align-items:center;padding:2px 6px}
#replybar textarea{flex:1;resize:none;border:0;outline:none;font-size:15px;font-family:inherit;padding:9px 6px;max-height:120px;background:transparent}
.circ{width:46px;height:46px;border-radius:50%;background:var(--green);color:#fff;border:0;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.attach{background:none;border:0;color:var(--mut);font-size:22px;cursor:pointer;padding:0 4px}

/* login + generic cards (bookings/settings) */
#login{max-width:360px;margin:14vh auto;padding:0 22px;display:flex;flex-direction:column;gap:12px;text-align:center}
#login .logo{width:88px;height:88px;margin:0 auto 6px;border-radius:20px;display:block}
input,textarea{font-family:inherit}
#login input{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;font-size:15px}
.act{background:var(--green);color:#fff;border:0;border-radius:10px;padding:12px 14px;font-size:15px;cursor:pointer}
.card{background:#fff;border-radius:12px;margin:10px;padding:12px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.mut{color:var(--mut);font-size:12px}
button.ghost{background:#fff;color:var(--green);border:1px solid var(--green);border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer}
button.danger{background:#fff;color:var(--bad);border:1px solid var(--bad);border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer}
.appt{border-left:4px solid var(--green);padding-left:10px}
.appt.cancelled{border-color:#d1d5db;opacity:.55}
h3{font-size:14px;margin:14px 12px 4px;color:var(--mut);font-weight:600}
.bookings input{padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:14px}
#toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;z-index:9}
</style>
</head>
<body>
<div id="login">
  <img class="logo" src="icon-192.png" alt="KC">
  <h2 style="color:var(--green);margin-bottom:0">KC Dada Women's Clinic</h2>
  <p class="mut">Staff sign in</p>
  <input id="email" type="email" placeholder="Email" autocomplete="username">
  <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
  <button class="act" id="loginBtn">Sign in</button>
  <p id="loginErr" class="mut" style="color:var(--bad)"></p>
</div>

<div id="app" class="hide" style="display:flex;flex-direction:column;height:100dvh">
<header>
  <button class="icn" id="backBtn" style="display:none">‹</button>
  <div class="av" id="hAv">KC</div>
  <div class="ttl" id="hTitle">KC Clinic</div>
</header>
<nav id="tabs">
  <button data-tab="chats" class="on">Chats</button>
  <button data-tab="bookings">Bookings</button>
  <button data-tab="settings">Settings</button>
</nav>
<main>
  <div id="chats" class="pane"></div>
  <div id="thread" class="hide">
    <div style="display:flex;gap:6px;padding:6px 10px;background:#f6f6f6;border-bottom:1px solid var(--line);align-items:center">
      <span id="tStatus" class="stat"></span>
      <span style="flex:1"></span>
      <button class="ghost" id="toBot">Give to bot</button>
      <button class="ghost" id="toClosed">Close</button>
    </div>
    <div id="msgs"></div>
    <div id="replybar">
      <button class="attach" id="attachBtn" title="Send image">📎</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <div class="inwrap"><textarea id="replyText" rows="1" placeholder="Message"></textarea></div>
      <button class="circ" id="sendBtn">➤</button>
    </div>
  </div>
  <div id="bookings" class="pane bookings hide"></div>
  <div id="settings" class="pane hide"></div>
</main>
</div>
<div id="toast"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SUPABASE_URL = "https://tzjvxqdnktgmxweqovwc.supabase.co";
const PUBLISHABLE_KEY = "sb_publishable_42opnFY4QP-KC2bCoNQSfw_OuHtBISF";
const VAPID = "BKxKqzaKG39_Xf2O543johvOqr1XXP-mLrvwiuRrzZRUmS-ay8DMFDAm0EDuujytb5GRBVDZFFBjLZdgZmrkRHk";
const sb = createClient(SUPABASE_URL, PUBLISHABLE_KEY);
const $ = (id) => document.getElementById(id);
let me = null, openConvo = null, channel = null;

function toast(t){ const el=$("toast"); el.textContent=t; el.style.opacity=1; setTimeout(()=>el.style.opacity=0, 2600); }
const IST = { timeZone:"Asia/Kolkata" };
const fmtT = (s)=> new Intl.DateTimeFormat("en-IN",{...IST,hour:"numeric",minute:"2-digit",hour12:true}).format(new Date(s));
const fmtDayFull = (s)=> new Intl.DateTimeFormat("en-IN",{...IST,weekday:"short",day:"numeric",month:"long"}).format(new Date(s));
const istKey = (s)=> new Intl.DateTimeFormat("en-CA",IST).format(new Date(s));
function listTime(s){ // WhatsApp-style: time if today, else short date
  return istKey(s)===istKey(Date.now()) ? fmtT(s) : new Intl.DateTimeFormat("en-IN",{...IST,day:"numeric",month:"short"}).format(new Date(s));
}
const esc = (s)=> (s??"").replace(/[&<>"]/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const initials = (n)=> (n||"").trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase() || "•";
const statLabel = (s)=> s==="needs_human"?"👋 Needs reply":s==="human"?"🧑 Staff":s==="closed"?"Closed":"🤖 Bot";
function tickHtml(s){ if(s==="read")return '<span class="tick read">✓✓</span>'; if(s==="delivered")return '<span class="tick">✓✓</span>'; return '<span class="tick">✓</span>'; }

$("loginBtn").onclick = async () => {
  $("loginErr").textContent = "";
  const { error } = await sb.auth.signInWithPassword({ email: $("email").value.trim(), password: $("pass").value });
  if (error) $("loginErr").textContent = error.message;
};
sb.auth.onAuthStateChange((_e, session) => {
  const was = !!me; me = session?.user ?? null;
  $("login").classList.toggle("hide", !!me);
  $("app").classList.toggle("hide", !me);
  if (me && !was) { showTab("chats"); subscribeRealtime(); }
});

document.querySelectorAll("#tabs button").forEach((b) => b.onclick = () => showTab(b.dataset.tab));
$("backBtn").onclick = () => showTab("chats");
function showTab(tab){
  openConvo = null;
  ["chats","thread","bookings","settings"].forEach((id)=>$(id).classList.add("hide"));
  $(tab).classList.remove("hide");
  document.querySelectorAll("#tabs button").forEach((b)=>b.classList.toggle("on", b.dataset.tab===tab));
  $("tabs").classList.remove("hide");
  $("backBtn").style.display = "none";
  $("hAv").textContent = "KC"; $("hTitle").textContent = "KC Clinic";
  if (tab==="chats") loadChats();
  if (tab==="bookings") loadBookings();
  if (tab==="settings") loadSettings();
}

async function loadChats(){
  const { data: convos, error } = await sb.from("conversations")
    .select("id,status,unread_count,updated_at,last_patient_msg_at,patients(name,wa_phone)")
    .order("updated_at",{ascending:false}).limit(100);
  if (error){ toast(error.message); return; }
  // one lightweight query for last-message previews
  const { data: recent } = await sb.from("messages")
    .select("conversation_id,body,type,direction,created_at").order("created_at",{ascending:false}).limit(400);
  const preview = {};
  for (const m of (recent??[])) if (!preview[m.conversation_id]) {
    const who = m.direction==="out" ? "You: " : "";
    preview[m.conversation_id] = who + (m.type==="image" ? "📷 Photo" : (m.body||"").replace(/\n/g," "));
  }
  $("chats").innerHTML = (convos??[]).map((c)=>{
    const p = c.patients ?? {}, nm = p.name || ("+"+(p.wa_phone||""));
    return `<div class="crow" onclick="openThread('${c.id}')">
      <div class="av">${esc(initials(p.name)||"•")}</div>
      <div class="mid">
        <div class="nm">${esc(nm)}</div>
        <div class="pv">${esc(preview[c.id]||statLabel(c.status))}</div>
      </div>
      <div class="rt">
        <span class="tm">${c.last_patient_msg_at?listTime(c.last_patient_msg_at):""}</span>
        ${c.unread_count>0?`<span class="badge">${c.unread_count}</span>`:`<span class="stat ${c.status}">${statLabel(c.status)}</span>`}
      </div></div>`;
  }).join("") || '<div class="empty">No conversations yet.</div>';
}

window.openThread = async (id) => {
  openConvo = id;
  ["chats","bookings","settings"].forEach((x)=>$(x).classList.add("hide"));
  $("thread").classList.remove("hide");
  $("tabs").classList.add("hide");
  $("backBtn").style.display = "inline-block";
  const { data: c } = await sb.from("conversations").select("status,patients(name,wa_phone)").eq("id", id).single();
  const nm = c?.patients?.name || ("+"+(c?.patients?.wa_phone ?? ""));
  $("hAv").textContent = initials(c?.patients?.name)||"•";
  $("hTitle").textContent = nm;
  $("tStatus").textContent = statLabel(c?.status); $("tStatus").className = "stat " + (c?.status ?? "");
  await sb.from("conversations").update({ unread_count: 0 }).eq("id", id);
  await renderMsgs();
};

async function renderMsgs(){
  if (!openConvo) return;
  const renderFor = openConvo;
  const { data: msgs } = await sb.from("messages")
    .select("direction,sender,type,body,media_path,delivery_status,created_at")
    .eq("conversation_id", renderFor).order("created_at").limit(300);
  const parts = []; let lastDay = "";
  for (const m of (msgs??[])) {
    const day = istKey(m.created_at);
    if (day !== lastDay){ parts.push(`<div class="daysep">${fmtDayFull(m.created_at)}</div>`); lastDay = day; }
    let media = "";
    if (m.media_path) {
      const { data: s } = await sb.storage.from("media").createSignedUrl(m.media_path, 3600);
      if (s?.signedUrl) media = /\.(jpg|jpeg|png|webp)$/i.test(m.media_path)
        ? `<a href="${s.signedUrl}" target="_blank"><img src="${s.signedUrl}" loading="lazy"></a>`
        : `<a href="${s.signedUrl}" target="_blank">📎 Open file</a>`;
    }
    const meta = `<span class="meta">${fmtT(m.created_at)}${m.direction==="out"?" "+tickHtml(m.delivery_status):""}</span>`;
    parts.push(`<div class="m ${m.direction}">${media}${esc(m.body)}${meta}</div>`);
  }
  if (openConvo !== renderFor) return;
  $("msgs").innerHTML = parts.join("");
  $("msgs").scrollTop = $("msgs").scrollHeight;
}

async function authHeader(){
  const { data } = await sb.auth.getSession();
  if (!data?.session) { toast("Session expired — please sign in again"); return null; }
  return "Bearer " + data.session.access_token;
}

$("sendBtn").onclick = async () => {
  const text = $("replyText").value.trim();
  if (!text || !openConvo) return;
  $("sendBtn").disabled = true;
  try {
    const auth = await authHeader(); if (!auth) return;
    const res = await fetch(SUPABASE_URL + "/functions/v1/send-message", {
      method: "POST",
      headers: { "Content-Type":"application/json", "apikey": PUBLISHABLE_KEY, "Authorization": auth },
      body: JSON.stringify({ conversation_id: openConvo, text }),
    });
    if (res.ok) { $("replyText").value = ""; autoGrow(); renderMsgs(); }
    else { const e = await res.json().catch(()=>({})); toast(e.error==="outside_24h_window" ? "24-hour reply window is closed — wait for the patient to message" : "Send failed: "+(e.error??res.status)); }
  } catch (err) { toast("Network error: " + err.message); }
  finally { $("sendBtn").disabled = false; }
};

$("attachBtn").onclick = () => { if (openConvo) $("fileInput").click(); };
$("fileInput").onchange = async () => {
  const f = $("fileInput").files[0]; if (!f || !openConvo) return;
  $("fileInput").value = "";
  toast("Sending image…");
  try {
    const auth = await authHeader(); if (!auth) return;
    const fd = new FormData();
    fd.append("conversation_id", openConvo);
    fd.append("caption", $("replyText").value.trim());
    fd.append("file", f);
    const res = await fetch(SUPABASE_URL + "/functions/v1/send-message", {
      method: "POST", headers: { "apikey": PUBLISHABLE_KEY, "Authorization": auth }, body: fd,
    });
    if (res.ok) { $("replyText").value = ""; autoGrow(); renderMsgs(); }
    else { const e = await res.json().catch(()=>({})); toast(e.error==="outside_24h_window" ? "24-hour reply window is closed" : "Image send failed: "+(e.error??res.status)); }
  } catch (err) { toast("Network error: " + err.message); }
};

const autoGrow = () => { const t=$("replyText"); t.style.height="auto"; t.style.height=Math.min(t.scrollHeight,120)+"px"; };
$("replyText").addEventListener("input", autoGrow);

$("toBot").onclick = () => setStatus("bot");
$("toClosed").onclick = () => setStatus("closed");
async function setStatus(status){
  if (!openConvo) return;
  await sb.from("conversations").update({ status }).eq("id", openConvo);
  $("tStatus").textContent = statLabel(status); $("tStatus").className = "stat "+status;
  toast(status==="bot" ? "Bot will reply again" : "Conversation closed");
}

async function loadBookings(){
  const today = new Date();
  const days = [...Array(8)].map((_,i)=> new Date(today.getTime()+i*86400000));
  const from = new Date(today.getTime()-86400000).toISOString();
  const { data: appts } = await sb.from("appointments")
    .select("id,slot_start,status,new_or_followup,note,type_code,appointment_types(name_en),patients(name,age,wa_phone)")
    .gte("slot_start", from).order("slot_start");
  const { data: blocked } = await sb.from("blocked_dates").select("date,reason").order("date");
  const byDay = {};
  for (const a of (appts??[])) (byDay[istKey(a.slot_start)] ??= []).push(a);
  let html = "";
  for (const d of days) {
    const list = byDay[istKey(d)] ?? [];
    html += `<h3>${fmtDayFull(d)} — ${list.filter(a=>a.status==="booked").length} booking(s)</h3>`;
    html += list.map((a)=>`
      <div class="card appt ${a.status!=="booked"?"cancelled":""}">
        <div class="row"><b>${fmtT(a.slot_start)} · ${esc(a.patients?.name??"?")} (${a.patients?.age??"?"})</b>
          ${a.status==="booked"?`<button class="danger" onclick="cancelAppt('${a.id}')">Cancel</button>`:`<span class="mut">${a.status}</span>`}</div>
        <div class="mut">${esc(a.appointment_types?.name_en ?? a.type_code)} · ${a.new_or_followup==="new"?"First visit":"Follow-up"} · +${esc(a.patients?.wa_phone??"")}</div>
        ${a.note?`<div class="mut">📝 ${esc(a.note)}</div>`:""}
      </div>`).join("");
  }
  html += `<h3>🚫 Blocked days</h3>
    <div class="card">
      <div class="row"><input type="date" id="blkDate" style="max-width:170px"><input id="blkReason" placeholder="Reason (optional)"><button class="act" onclick="blockDay()">Block</button></div>
      ${(blocked??[]).map((b)=>`<div class="row" style="margin-top:8px"><span>${b.date} ${esc(b.reason??"")}</span><button class="ghost" onclick="unblockDay('${b.date}')">Remove</button></div>`).join("")}
    </div>`;
  $("bookings").innerHTML = html;
}
window.cancelAppt = async (id) => {
  if (!confirm("Cancel this appointment?")) return;
  const { error } = await sb.from("appointments").update({ status: "cancelled_by_clinic" }).eq("id", id);
  if (error) toast(error.message); else { toast("Cancelled — please inform the patient (chat/call)"); loadBookings(); }
};
window.blockDay = async () => {
  const date = $("blkDate").value; if (!date) return;
  const { error } = await sb.from("blocked_dates").insert({ date, reason: $("blkReason").value || null });
  if (error) toast(error.message); else loadBookings();
};
window.unblockDay = async (date) => { await sb.from("blocked_dates").delete().eq("date", date); loadBookings(); };

async function loadSettings(){
  const perm = ("Notification" in window) ? Notification.permission : "unsupported";
  $("settings").innerHTML = `
    <div class="card">
      <b>🔔 Notifications</b>
      <p class="mut" style="margin:6px 0">Get an alert on this device for every new message and booking. On iPhone, add this app to the Home Screen first, then open it from the icon.</p>
      <p class="mut">Status: ${perm}</p>
      <button class="act" id="pushBtn">Enable on this device</button>
    </div>
    <div class="card"><b>Signed in as</b><p class="mut" style="margin-top:4px">${esc(me?.email??"")}</p><button class="danger" id="logoutBtn" style="margin-top:8px">Sign out</button></div>`;
  $("pushBtn").onclick = enablePush;
  $("logoutBtn").onclick = async () => { await sb.auth.signOut(); location.reload(); };
}
function b64ToU8(b64){ const pad="=".repeat((4-b64.length%4)%4); const raw=atob((b64+pad).replace(/-/g,"+").replace(/_/g,"/")); return Uint8Array.from([...raw].map(c=>c.charCodeAt(0))); }
async function enablePush(){
  try {
    if (!("serviceWorker" in navigator)) { toast("This browser does not support notifications"); return; }
    const reg = await navigator.serviceWorker.register("sw.js");
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { toast("Please allow notification permission"); return; }
    const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: b64ToU8(VAPID) });
    const j = sub.toJSON();
    const { error } = await sb.from("push_subscriptions").upsert({ endpoint:j.endpoint, keys:j.keys, device_label: navigator.userAgent.slice(0,80) }, { onConflict:"endpoint" });
    if (error) toast(error.message); else toast("✅ Notifications enabled");
    loadSettings();
  } catch (e) { toast("Push setup failed: " + e.message); }
}

function subscribeRealtime(){
  if (channel) return;
  channel = sb.channel("inbox")
    .on("postgres_changes",{event:"*",schema:"public",table:"messages"},()=>{ if(openConvo)renderMsgs(); if(!$("chats").classList.contains("hide"))loadChats(); })
    .on("postgres_changes",{event:"*",schema:"public",table:"conversations"},()=>{ if(!$("chats").classList.contains("hide"))loadChats(); })
    .subscribe();
}
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
